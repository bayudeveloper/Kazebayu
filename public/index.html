<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Himmel Temp Mail - Temporary email service with @himmel.com domain">
    <meta name="author" content="Bayu Official">
    
    <link rel="icon" type="image/jpeg" href="https://files.catbox.moe/766cj3.jpg">
    
    <title>Himmel Temp Mail</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .time-display {
            position: fixed;
            top: 20px;
            right: 30px;
            background: #f5f5f5;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            color: #333;
            border: 1px solid #eaeaea;
            z-index: 100;
        }

        .banner-wrapper {
            width: 100%;
            max-width: 800px;
            margin: 60px auto 30px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .banner-16x9 {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #f5f5f5;
        }

        .banner-16x9 img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto 40px;
            background: #ffffff;
            border-radius: 32px;
            padding: 40px;
            border: 1px solid #f0f0f0;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #eee;
        }

        .icon-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .title h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .title p {
            color: #666;
            font-size: 0.9rem;
        }

        .dev-name {
            color: #888;
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .domain-badge {
            display: inline-block;
            padding: 6px 16px;
            background: #f5f5f5;
            color: #333;
            border-radius: 40px;
            font-size: 0.9rem;
            margin-bottom: 30px;
            border: 1px solid #eaeaea;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .input-field {
            flex: 1;
            min-width: 200px;
            padding: 14px 20px;
            border: 1.5px solid #e0e0e0;
            border-radius: 60px;
            font-size: 1rem;
        }

        .input-field:focus {
            outline: none;
            border-color: #000;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            background: white;
            border: 1.5px solid #e0e0e0;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #1a1a1a;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #333;
        }

        .btn-secondary:hover {
            background: #f8f8f8;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f0f0f0;
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        .footer {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            padding: 20px;
        }

        @media (max-width: 600px) {
            .container { padding: 25px; }
            .input-group { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="time-display" id="currentTime"></div>

    <div class="banner-wrapper">
        <div class="banner-16x9">
            <img src="https://files.catbox.moe/3ix1pf.jpg" alt="Himmel Banner">
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div class="icon-box">
                <img src="https://files.catbox.moe/766cj3.jpg" alt="Himmel Icon">
            </div>
            <div class="title">
                <h1>Himmel Temp Mail</h1>
                <p>temporary email • @himmel.com</p>
                <div class="dev-name">DEV : Bayu Official</div>
            </div>
        </div>

        <div class="domain-badge">✦ @himmel.com ✦</div>

        <div class="input-group">
            <input type="text" class="input-field" id="emailPrefix" placeholder="your name (optional)">
            <button class="btn btn-primary" id="generateBtn">Generate</button>
            <button class="btn btn-secondary" id="randomBtn">Random</button>
        </div>

        <div id="globalLoading" class="hidden text-center" style="margin-top:20px;">
            <div class="loading"></div>
            <p style="color:#666; margin-top:10px;">Creating your email...</p>
        </div>
    </div>

    <footer class="footer">
        <p>© 2024 Himmel Temp Mail • Bayu Official</p>
    </footer>

    <script>
        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            const date = now.getDate();
            const month = months[now.getMonth()];
            const year = now.getFullYear();
            
            document.getElementById('currentTime').textContent = `${hours}:${minutes}${ampm} • ${date} ${month} ${year}`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        const generateBtn = document.getElementById('generateBtn');
        const randomBtn = document.getElementById('randomBtn');
        const loading = document.getElementById('globalLoading');

        generateBtn.addEventListener('click', () => generateEmail());
        randomBtn.addEventListener('click', () => {
            document.getElementById('emailPrefix').value = '';
            generateEmail();
        });

        async function generateEmail() {
            const prefix = document.getElementById('emailPrefix').value;
            
            loading.classList.remove('hidden');
            generateBtn.disabled = true;
            randomBtn.disabled = true;

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: prefix })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('himmel_email', data.email);
                    localStorage.setItem('himmel_password', data.password);
                    localStorage.setItem('himmel_token', data.token);
                    
                    window.location.href = '/inbox.html';
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                alert('Network Error: ' + error.message);
            } finally {
                loading.classList.add('hidden');
                generateBtn.disabled = false;
                randomBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
