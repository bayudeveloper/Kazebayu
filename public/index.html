<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Himmel Temp Mail - Generate temporary email instantly, no registration needed.">
    <meta name="author" content="Bayu Official">
    <link rel="icon" type="image/jpeg" href="https://files.catbox.moe/766cj3.jpg">
    <title>Himmel Temp Mail</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0e0e0f;
            --surface:   #161618;
            --border:    #252527;
            --accent:    #e8e0d0;
            --muted:     #555558;
            --text:      #d4cfc8;
            --text-dim:  #7a7870;
            --highlight: #2a2a2c;
            --pulse:     #c8b89a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── TOP BAR ── */
        header {
            width: 100%;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            overflow: hidden;
        }

        .brand-logo img { width: 100%; height: 100%; object-fit: cover; }

        .brand-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent);
        }

        .time-pill {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            background: var(--highlight);
            border: 1px solid var(--border);
            padding: 5px 14px;
            border-radius: 999px;
        }

        /* ── MAIN ── */
        main {
            flex: 1;
            width: 100%;
            max-width: 680px;
            padding: 40px 20px 60px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ── BANNER ── */
        .banner {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            aspect-ratio: 16/9;
        }

        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ── CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 6px;
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .card-icon img { width: 100%; height: 100%; object-fit: cover; }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
        }

        .card-sub {
            font-size: 0.78rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .card-desc {
            font-size: 0.82rem;
            color: var(--text-dim);
            line-height: 1.7;
            margin: 16px 0 24px;
            padding: 14px 16px;
            background: var(--highlight);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        /* ── INPUT GROUP ── */
        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-field {
            flex: 1;
            min-width: 160px;
            padding: 12px 18px;
            background: var(--highlight);
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'DM Mono', monospace;
            transition: border-color 0.15s;
            outline: none;
        }

        .input-field::placeholder { color: var(--muted); }
        .input-field:focus { border-color: var(--muted); }

        .btn-primary {
            padding: 12px 24px;
            background: var(--accent);
            color: #0e0e0f;
            border: none;
            border-radius: 999px;
            font-size: 0.88rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: opacity 0.15s;
            white-space: nowrap;
        }

        .btn-primary:hover { opacity: 0.88; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-ghost {
            padding: 12px 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 999px;
            font-size: 0.88rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-ghost:hover { border-color: var(--muted); color: var(--text); }
        .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── LOADING ── */
        .loading-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--pulse);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── FOOTER ── */
        footer {
            width: 100%;
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
        }

        .hidden { display: none !important; }

        @media (max-width: 480px) {
            .card { padding: 22px; }
            .input-row { flex-direction: column; }
            .btn-primary, .btn-ghost { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div class="brand-logo">
            <img src="https://files.catbox.moe/766cj3.jpg" alt="Himmel">
        </div>
        <span class="brand-name">Himmel Mail</span>
    </div>
    <div class="time-pill" id="currentTime"></div>
</header>

<main>
    <div class="banner">
        <img src="https://files.catbox.moe/3ix1pf.jpg" alt="Himmel Banner">
    </div>

    <div class="card">
        <div class="card-header">
            <div class="card-icon">
                <img src="https://files.catbox.moe/766cj3.jpg" alt="Himmel">
            </div>
            <div>
                <div class="card-title">Himmel Temp Mail</div>
                <div class="card-sub">DEV : Bayu Official</div>
            </div>
        </div>

        <div class="card-desc">
            Generate temporary email instantly — no registration, no hassle.
            Use it to sign up anywhere, avoid spam, and keep your real inbox clean.
            Email auto-refreshes every 30 seconds.
        </div>

        <div class="input-row">
            <input type="text" class="input-field" id="emailPrefix" placeholder="username (optional)">
            <button class="btn-primary" id="generateBtn">Generate</button>
            <button class="btn-ghost" id="randomBtn">Random</button>
        </div>

        <div class="loading-row hidden" id="loadingRow">
            <div class="spinner"></div>
            <span>Creating your email…</span>
        </div>
    </div>
</main>

<footer>© 2025 Himmel Temp Mail • Bayu Official</footer>

<script>
    // ── Clock ──
    function updateTime() {
        const now = new Date();
        let h = now.getHours(), m = now.getMinutes().toString().padStart(2,'0');
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = (h % 12) || 12;
        const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
        document.getElementById('currentTime').textContent =
            `${h}:${m} ${ampm} • ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
    }
    updateTime();
    setInterval(updateTime, 1000);

    // ── Generate ──
    document.getElementById('generateBtn').addEventListener('click', () => generateEmail());
    document.getElementById('randomBtn').addEventListener('click', () => {
        document.getElementById('emailPrefix').value = '';
        generateEmail();
    });
    document.getElementById('emailPrefix').addEventListener('keydown', e => {
        if (e.key === 'Enter') generateEmail();
    });

    async function generateEmail() {
        const prefix = document.getElementById('emailPrefix').value.trim();
        const genBtn = document.getElementById('generateBtn');
        const rndBtn = document.getElementById('randomBtn');
        const loadEl = document.getElementById('loadingRow');

        genBtn.disabled = rndBtn.disabled = true;
        loadEl.classList.remove('hidden');

        try {
            const res  = await fetch('/api/generate', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email: prefix })
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('himmel_email',    data.email);
                localStorage.setItem('himmel_password', data.password || '');
                localStorage.setItem('himmel_token',    data.token);
                localStorage.setItem('himmel_provider', data.provider || 'mailtm');
                window.location.href = '/inbox.html';
            } else {
                alert('Error: ' + data.message);
            }
        } catch (err) {
            alert('Network Error: ' + err.message);
        } finally {
            genBtn.disabled = rndBtn.disabled = false;
            loadEl.classList.add('hidden');
        }
    }
</script>
</body>
</html>
