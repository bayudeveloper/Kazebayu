<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="https://files.catbox.moe/766cj3.jpg">
    <title>Himmel Inbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
        }

        .top-bar {
            background: #1a1a1a;
            color: white;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .bar-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            overflow: hidden;
        }

        .bar-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bar-title h2 {
            font-size: 1.4rem;
            font-weight: 500;
        }

        .bar-title p {
            font-size: 0.8rem;
            color: #aaa;
        }

        .email-display {
            background: #333;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #555;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-left: 15px;
        }

        .logout-btn:hover {
            background: #333;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 70px);
        }

        .sidebar {
            width: 200px;
            background: white;
            border-right: 1px solid #e0e0e0;
            padding: 20px 0;
        }

        .compose-btn {
            margin: 0 15px 20px;
            padding: 12px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            width: calc(100% - 30px);
        }

        .folder-list {
            list-style: none;
        }

        .folder-item {
            padding: 12px 25px;
            color: #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .folder-item.active {
            background: #f0f0f0;
            font-weight: 500;
            color: #000;
        }

        .inbox-area {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .inbox-toolbar {
            padding: 15px 25px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            padding: 8px 20px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 30px;
            cursor: pointer;
        }

        .refresh-btn:hover {
            background: #eaeaea;
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
        }

        .message-item {
            padding: 15px 25px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .message-item:hover {
            background: #fafafa;
        }

        .message-sender {
            width: 200px;
            font-weight: 500;
            color: #333;
        }

        .message-subject {
            flex: 1;
            color: #555;
        }

        .message-time {
            color: #888;
            font-size: 0.85rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
        }

        .modal-body {
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .loading {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 2px solid #f0f0f0;
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="bar-left">
            <div class="bar-icon">
                <img src="https://files.catbox.moe/766cj3.jpg">
            </div>
            <div class="bar-title">
                <h2>Himmel Mail</h2>
                <p>temporary email</p>
            </div>
        </div>
        <div style="display: flex; align-items: center;">
            <span class="email-display" id="currentEmail"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <button class="compose-btn" onclick="compose()">＋ Compose</button>
            <ul class="folder-list">
                <li class="folder-item active">📥 Inbox</li>
                <li class="folder-item">📤 Sent</li>
                <li class="folder-item">📝 Drafts</li>
                <li class="folder-item">🗑️ Trash</li>
            </ul>
        </div>

        <div class="inbox-area">
            <div class="inbox-toolbar">
                <h3>Inbox</h3>
                <button class="refresh-btn" onclick="loadInbox()">↻ Refresh</button>
            </div>
            
            <div class="messages-list" id="messagesList">
                <div class="empty-state">📭 Loading messages...</div>
            </div>
        </div>
    </div>

    <div id="messageModal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 id="modalSubject"></h2>
            <p id="modalFrom" style="color:#666;"></p>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div id="loadingOverlay" class="modal hidden" style="background:rgba(255,255,255,0.8);">
        <div style="text-align:center;">
            <div class="loading"></div>
            <p style="margin-top:20px;">Loading...</p>
        </div>
    </div>

    <script>
        const email = localStorage.getItem('himmel_email');
        const token = localStorage.getItem('himmel_token');
        
        if (!email || !token) {
            window.location.href = '/';
        }
        
        document.getElementById('currentEmail').textContent = email;

        async function loadInbox() {
            showLoading(true);
            try {
                const res = await fetch(`/api/inbox/${email}?token=${token}`);
                const data = await res.json();
                
                if (data.success) {
                    displayMessages(data.messages || []);
                }
            } catch (error) {
                console.error(error);
            } finally {
                showLoading(false);
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesList');
            
            if (!messages.length) {
                container.innerHTML = '<div class="empty-state">📭 No messages yet</div>';
                return;
            }
            
            let html = '';
            messages.forEach(msg => {
                html += `
                    <div class="message-item" onclick="openMessage('${msg.id}')">
                        <div class="message-sender">${msg.from || 'Unknown'}</div>
                        <div class="message-subject">${msg.subject || '(no subject)'}</div>
                        <div class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        async function openMessage(id) {
            showLoading(true);
            try {
                const res = await fetch(`/api/message/${email}/${id}?token=${token}`);
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('modalSubject').textContent = data.message.subject || '(no subject)';
                    document.getElementById('modalFrom').textContent = `From: ${data.message.from || 'Unknown'}`;
                    document.getElementById('modalBody').textContent = data.message.text || '(empty)';
                    document.getElementById('messageModal').classList.remove('hidden');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function compose() {
            window.location.href = `mailto:${email}`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        function closeModal() {
            document.getElementById('messageModal').classList.add('hidden');
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        loadInbox();
        setInterval(loadInbox, 30000);
    </script>
</body>
</html>
