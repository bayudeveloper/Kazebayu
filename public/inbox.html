<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="https://files.catbox.moe/766cj3.jpg">
    <title>Himmel Inbox</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0e0e0f;
            --surface:   #161618;
            --surface2:  #1c1c1e;
            --border:    #252527;
            --border2:   #303033;
            --accent:    #e8e0d0;
            --muted:     #555558;
            --text:      #d4cfc8;
            --text-dim:  #7a7870;
            --highlight: #2a2a2c;
            --pulse:     #c8b89a;
            --green:     #4caf76;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-logo { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .brand-logo img { width: 100%; height: 100%; object-fit: cover; }
        .brand-name { font-size: 0.95rem; font-weight: 600; color: var(--accent); letter-spacing: 0.01em; }

        .header-right { display: flex; align-items: center; gap: 10px; }

        .email-pill {
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            background: var(--highlight);
            border: 1px solid var(--border);
            color: var(--pulse);
            padding: 6px 14px;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.15s;
            user-select: all;
        }
        .email-pill:hover { border-color: var(--muted); }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 6px 14px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.15s;
        }
        .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

        /* ── TOOLBAR ── */
        .toolbar {
            padding: 12px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: var(--surface);
        }

        .toolbar-left { display: flex; align-items: center; gap: 12px; }

        .toolbar-title {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .msg-count {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            background: var(--highlight);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 999px;
        }

        .auto-refresh-info { font-size: 0.73rem; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }

        .pulse-dot {
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse-anim 2s ease-in-out infinite;
        }

        @keyframes pulse-anim {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.8); }
        }

        .countdown { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }

        .btn-refresh {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 5px 14px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.76rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.15s;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-refresh:hover { border-color: var(--muted); color: var(--text); }
        .btn-refresh .icon { display: inline-block; }
        .btn-refresh.spinning .icon { animation: spin 0.6s linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MESSAGE LIST ── */
        .messages-wrap { flex: 1; overflow-y: auto; padding: 6px 0; }
        .messages-wrap::-webkit-scrollbar { width: 4px; }
        .messages-wrap::-webkit-scrollbar-track { background: transparent; }
        .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-row {
            display: grid;
            grid-template-columns: 200px 1fr auto;
            align-items: center;
            gap: 16px;
            padding: 13px 28px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg-row:hover { background: var(--highlight); }
        .msg-row.unread .msg-sender { color: var(--accent); font-weight: 600; }
        .msg-row.unread .msg-subject { color: var(--text); }

        .msg-sender { font-size: 0.84rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-subject { font-size: 0.84rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-time { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); white-space: nowrap; }

        /* ── STATES ── */
        .state-center {
            padding: 60px 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px; color: var(--text-dim);
        }
        .state-icon { font-size: 2rem; opacity: 0.35; }
        .state-text { font-size: 0.82rem; }

        .spinner {
            width: 22px; height: 22px;
            border: 2px solid var(--border);
            border-top-color: var(--pulse);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* ══════════════════════════════════
           MODAL
        ══════════════════════════════════ */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .overlay.open { opacity: 1; pointer-events: all; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 20px;
            width: 92%;
            max-width: 700px;
            max-height: 86vh;
            display: flex; flex-direction: column;
            transform: translateY(16px) scale(0.98);
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
        }
        .overlay.open .modal { transform: translateY(0) scale(1); }

        /* Modal header */
        .modal-header {
            padding: 20px 22px 18px;
            border-bottom: 1px solid var(--border);
            position: relative;
            background: var(--surface2);
            flex-shrink: 0;
        }

        .modal-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .modal-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a2a2c, #1a1a1c);
            border: 1px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            color: var(--pulse);
            font-weight: 700;
            font-family: 'DM Mono', monospace;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .modal-meta-right { flex: 1; min-width: 0; }

        .modal-from-name {
            font-size: 0.86rem;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .modal-from-addr {
            font-family: 'DM Mono', monospace;
            font-size: 0.69rem;
            color: var(--text-dim);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .modal-date-badge {
            font-family: 'DM Mono', monospace;
            font-size: 0.67rem;
            color: var(--text-dim);
            background: var(--highlight);
            border: 1px solid var(--border);
            padding: 3px 9px;
            border-radius: 999px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .modal-subject {
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent);
            line-height: 1.4;
            padding-right: 36px;
        }

        .modal-close {
            position: absolute;
            top: 16px; right: 18px;
            background: var(--highlight);
            border: 1px solid var(--border);
            color: var(--text-dim);
            width: 28px; height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .modal-close:hover { color: var(--accent); border-color: var(--muted); background: var(--border2); }

        /* Modal body */
        .modal-body {
            overflow-y: auto;
            flex: 1;
        }
        .modal-body::-webkit-scrollbar { width: 4px; }
        .modal-body::-webkit-scrollbar-track { background: transparent; }
        .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Plain text */
        .email-plain {
            padding: 24px 28px;
            font-size: 0.875rem;
            line-height: 1.9;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'DM Sans', sans-serif;
        }

        /* HTML email card */
        .email-html-wrap { padding: 18px 22px; }

        .email-html-card {
            border: 1px solid var(--border2);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .email-html-bar {
            padding: 9px 14px;
            background: var(--highlight);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot-red   { width: 9px; height: 9px; border-radius: 50%; background: #ff5f57; }
        .dot-yellow{ width: 9px; height: 9px; border-radius: 50%; background: #febc2e; }
        .dot-green { width: 9px; height: 9px; border-radius: 50%; background: #28c840; }

        .email-html-label {
            margin-left: auto;
            font-size: 0.66rem;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
        }

        .email-iframe {
            width: 100%;
            border: none;
            min-height: 280px;
            display: block;
            background: #f8f8f8;
        }

        /* Modal loading */
        .modal-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 60px 20px;
            color: var(--text-dim);
            font-size: 0.82rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div class="brand-logo">
            <img src="https://files.catbox.moe/766cj3.jpg" alt="Himmel">
        </div>
        <span class="brand-name">Himmel Mail</span>
    </div>
    <div class="header-right">
        <span class="email-pill" id="emailPill" onclick="copyEmail(this)" title="Click to copy"></span>
        <button class="btn-ghost" onclick="logout()">Logout</button>
    </div>
</header>

<div class="toolbar">
    <div class="toolbar-left">
        <span class="toolbar-title">Inbox</span>
        <span class="msg-count" id="msgCount">0</span>
        <div class="auto-refresh-info">
            <div class="pulse-dot"></div>
            <span>refresh in</span>
            <span class="countdown" id="countdown">30s</span>
        </div>
    </div>
    <button class="btn-refresh" id="refreshBtn" onclick="loadInbox(true)">
        <span class="icon">↻</span> Refresh
    </button>
</div>

<div class="messages-wrap">
    <div class="state-center" id="loadingState">
        <div class="spinner"></div>
        <span class="state-text">Loading inbox…</span>
    </div>
    <div class="state-center hidden" id="emptyState">
        <div class="state-icon">📭</div>
        <span class="state-text">No messages yet — waiting for mail</span>
    </div>
    <div id="msgList"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-meta">
                <div class="modal-avatar" id="modalAvatar">?</div>
                <div class="modal-meta-right">
                    <div class="modal-from-name" id="modalFromName">—</div>
                    <div class="modal-from-addr" id="modalFromAddr">—</div>
                </div>
                <div class="modal-date-badge" id="modalDate">—</div>
            </div>
            <div class="modal-subject" id="modalSubject">—</div>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" id="modalBody">
            <div class="modal-loading">
                <div class="spinner"></div>
                <span>Loading message…</span>
            </div>
        </div>
    </div>
</div>

<script>
    const email    = localStorage.getItem('himmel_email');
    const token    = localStorage.getItem('himmel_token');
    const provider = localStorage.getItem('himmel_provider') || 'mailtm';

    if (!email || !token) { window.location.href = '/'; }

    document.getElementById('emailPill').textContent = email;

    // ── COUNTDOWN ──
    let countdownVal = 30;
    let countdownInterval;

    function resetCountdown() {
        clearInterval(countdownInterval);
        countdownVal = 30;
        document.getElementById('countdown').textContent = '30s';
        countdownInterval = setInterval(() => {
            countdownVal--;
            document.getElementById('countdown').textContent = countdownVal + 's';
            if (countdownVal <= 0) { clearInterval(countdownInterval); loadInbox(); }
        }, 1000);
    }

    // ── INBOX ──
    async function loadInbox(manual = false) {
        const btn = document.getElementById('refreshBtn');
        if (manual) {
            btn.classList.add('spinning');
            setTimeout(() => btn.classList.remove('spinning'), 600);
        }

        try {
            const res  = await fetch(`/api/inbox/${encodeURIComponent(email)}?token=${encodeURIComponent(token)}&provider=${provider}`);
            const data = await res.json();

            document.getElementById('loadingState').classList.add('hidden');
            if (!data.success) throw new Error(data.message);

            const msgs = data.messages || [];
            document.getElementById('msgCount').textContent = msgs.length;

            if (!msgs.length) {
                document.getElementById('emptyState').classList.remove('hidden');
                document.getElementById('msgList').innerHTML = '';
            } else {
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('msgList').innerHTML = msgs.map(msg => `
                    <div class="msg-row unread" onclick="openMessage('${escAttr(String(msg.id))}')">
                        <div class="msg-sender">${escHtml(msg.from || 'Unknown')}</div>
                        <div class="msg-subject">${escHtml(msg.subject || '(no subject)')}</div>
                        <div class="msg-time">${formatTime(msg.created_at)}</div>
                    </div>
                `).join('');
            }
        } catch (err) {
            console.error('Inbox error:', err);
        }

        resetCountdown();
    }

    // ── OPEN MESSAGE ──
    async function openMessage(id) {
        document.getElementById('modalAvatar').textContent   = '…';
        document.getElementById('modalFromName').textContent = '—';
        document.getElementById('modalFromAddr').textContent = '—';
        document.getElementById('modalDate').textContent     = '—';
        document.getElementById('modalSubject').textContent  = 'Loading…';
        document.getElementById('modalBody').innerHTML = `
            <div class="modal-loading"><div class="spinner"></div><span>Loading message…</span></div>`;
        document.getElementById('overlay').classList.add('open');

        try {
            const res  = await fetch(`/api/message/${encodeURIComponent(email)}/${id}?token=${encodeURIComponent(token)}&provider=${provider}`);
            const data = await res.json();
            if (!data.success) throw new Error(data.message);

            const m = data.message;
            const sender = m.from || 'Unknown';
            const avatarChar = sender.replace(/[^a-zA-Z]/g,'')[0]?.toUpperCase() || '?';

            document.getElementById('modalAvatar').textContent   = avatarChar;
            document.getElementById('modalFromName').textContent = sender.split('@')[0] || sender;
            document.getElementById('modalFromAddr').textContent = sender;
            document.getElementById('modalDate').textContent     = formatTimeFull(m.created_at);
            document.getElementById('modalSubject').textContent  = m.subject || '(no subject)';

            const htmlContent = Array.isArray(m.html) ? m.html.join('') : (m.html || '');
            const textContent = Array.isArray(m.text) ? m.text.join('\n') : (m.text || '');

            if (htmlContent.trim()) {
                document.getElementById('modalBody').innerHTML = `
                    <div class="email-html-wrap">
                        <div class="email-html-card">
                            <div class="email-html-bar">
                                <div class="dot-red"></div>
                                <div class="dot-yellow"></div>
                                <div class="dot-green"></div>
                                <span class="email-html-label">HTML EMAIL</span>
                            </div>
                            <iframe class="email-iframe" id="emailFrame"
                                srcdoc="${escAttr(htmlContent)}"
                                sandbox="allow-same-origin"></iframe>
                        </div>
                    </div>`;
                const iframe = document.getElementById('emailFrame');
                iframe.onload = () => {
                    try {
                        const h = iframe.contentDocument.body.scrollHeight;
                        iframe.style.height = Math.min(h + 32, 560) + 'px';
                    } catch(e) {}
                };
            } else {
                document.getElementById('modalBody').innerHTML =
                    `<div class="email-plain">${escHtml(textContent || '(empty message)')}</div>`;
            }
        } catch(err) {
            document.getElementById('modalBody').innerHTML =
                `<div class="email-plain" style="color:var(--text-dim)">Error: ${escHtml(err.message)}</div>`;
        }
    }

    function closeModal(e) {
        if (e && e.target !== document.getElementById('overlay')) return;
        document.getElementById('overlay').classList.remove('open');
    }

    function copyEmail(el) {
        navigator.clipboard.writeText(email).then(() => {
            const orig = el.textContent;
            el.textContent = 'Copied!';
            setTimeout(() => el.textContent = orig, 1500);
        });
    }

    function logout() { localStorage.clear(); window.location.href = '/'; }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) {
        return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function formatTime(iso) {
        if (!iso) return '—';
        const d = new Date(typeof iso === 'number' ? iso * 1000 : iso);
        const now = new Date();
        if (d.toDateString() === now.toDateString())
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    }
    function formatTimeFull(iso) {
        if (!iso) return '—';
        const d = new Date(typeof iso === 'number' ? iso * 1000 : iso);
        return d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') document.getElementById('overlay').classList.remove('open');
    });

    loadInbox();
</script>
</body>
</html>
